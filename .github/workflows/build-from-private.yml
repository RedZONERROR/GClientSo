name: Build Native Library (Auto from Private Repo)

on:
  repository_dispatch:
    types: [build-native-library]

jobs:
  build:
    name: Build and Deploy Native Library
    runs-on: ubuntu-latest
    
    steps:
      - name: Display dispatch payload
        run: |
          echo "## 📦 Received Build Request" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Source Repository Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.event.client_payload.source_repo }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.event.client_payload.source_commit }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.event.client_payload.source_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** @${{ github.event.client_payload.source_actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Message:** ${{ github.event.client_payload.commit_message }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
      
      - name: Checkout private repository source code
        uses: actions/checkout@v4
        with:
          repository: RedZONERROR/GameClientSocket
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          submodules: recursive
          path: source-repo
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true
      
      - name: Cache NDK build
        uses: actions/cache@v4
        with:
          path: |
            ~/.ndk-cache
            source-repo/app/src/main/obj
          key: ${{ runner.os }}-ndk-${{ github.event.client_payload.source_commit }}
          restore-keys: |
            ${{ runner.os }}-ndk-
      
      - name: Build Native Library (Release Mode)
        run: |
          cd source-repo/app/src/main/jni
          
          # Always build in RELEASE mode for automated builds
          export NDK_DEBUG=0
          echo "Building in RELEASE mode with logging disabled"
          
          # Build with ndk-build using all available CPU cores
          ndk-build -j$(nproc) NDK_DEBUG=$NDK_DEBUG
          
          echo "Build completed successfully!"
          
          # List built libraries
          echo "Built libraries:"
          find ../libs -name "*.so" -type f
      
      - name: Prepare artifacts
        run: |
          # Create output directory
          mkdir -p build-output
          
          # Copy built libraries
          cp -r source-repo/app/src/main/libs/* build-output/
          
          # Create build info file
          cat > build-output/BUILD_INFO.txt << EOF
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Build Type: release
          Source Commit SHA: ${{ github.event.client_payload.source_commit }}
          Source Commit Message: ${{ github.event.client_payload.commit_message }}
          Source Repository: ${{ github.event.client_payload.source_repo }}
          Source Branch: ${{ github.event.client_payload.source_ref }}
          Triggered by: ${{ github.event.client_payload.source_actor }}
          Workflow Run: ${{ github.event.client_payload.workflow_run }}
          Build Method: Automated (repository_dispatch)
          EOF
          
          echo "Artifacts prepared:"
          ls -lah build-output/
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-release-auto-${{ github.run_number }}
          path: build-output/
          retention-days: 30
      
      - name: Checkout public repository (self)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: deploy-repo
      
      - name: Deploy to public repository
        run: |
          # Copy built libraries to deploy repo
          mkdir -p deploy-repo/libs
          cp -r build-output/* deploy-repo/libs/
          
          cd deploy-repo
          
          # Configure git
          git config user.name "Suman Kumar Mondal"
          git config user.email "redzonerror@gmail.com"
          
          # Add and commit changes
          git add .
          
          # Create commit message with build info
          COMMIT_MSG="Build: Native library from GameClientSocket@${{ github.event.client_payload.source_commit }}

          Build Type: release (automated)
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Workflow Run: #${{ github.run_number }}
          Source Commit: ${{ github.event.client_payload.source_commit }}
          Source Message: ${{ github.event.client_payload.commit_message }}
          
          Source Repository: ${{ github.event.client_payload.source_repo }}
          Triggered by: ${{ github.event.client_payload.source_actor }}
          Build Method: Automated via repository_dispatch"
          
          git commit -m "$COMMIT_MSG" || echo "No changes to commit"
          
          # Push to public repository
          git push origin main
          
          echo "✓ Successfully deployed to public repository"
      
      - name: Create deployment summary
        run: |
          echo "## 🎉 Build & Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type:** release (automated)" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Commit:** \`${{ github.event.client_payload.source_commit }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Repository:** ${{ github.event.client_payload.source_repo }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** @${{ github.event.client_payload.source_actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Repository:** [RedZONERROR/GClientSo](https://github.com/RedZONERROR/GClientSo)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Libraries" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh build-output/arm64-v8a/*.so 2>/dev/null || echo "No libraries found" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
